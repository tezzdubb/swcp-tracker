name: Deploy site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Configure Pages
        uses: actions/configure-pages@v6
      - name: Prepare static site
        run: |
          mkdir -p public
          cp index.html privacy.html README.md public/
          cp -R images public/images
          touch public/.nojekyll
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public
      - name: Deploy to GitHub Pages
        id: deployment
        # Pinned to v4 (node20), not v5: v5's node24 runtime hits a known
        # undici HTTP/2 connection bug (nodejs/undici#4552) that makes this
        # step fail intermittently with "Deployment failed, try again later."
        # A stray deprecation warning is a fair trade for a deploy that works.
        uses: actions/deploy-pages@v4
